services:
  flex-agent-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: flex-agent-web:latest
    container_name: flex-agent-web
    ports:
      - "${FLEX_AGENT_PORT:-9876}:8000"
    env_file:
      - .env
    volumes:
      - flex-agent-workspaces:/app/workspaces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  flex-agent-workspaces:
